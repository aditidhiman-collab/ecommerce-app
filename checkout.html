<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - ShopEasy</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="navbar">
    <h1 class="logo">ShopEasy</h1>
    <div class="nav-right">
      <div class="auth-area" id="authArea"></div>
      <a href="index.html" style="color:white; text-decoration:none;">← Back to Shop</a>
    </div>
  </header>

  <main class="checkout-main">
    <h2 class="section-title">Order Summary</h2>
    <div id="checkoutItems" class="checkout-items"></div>
    <div class="checkout-total">
      <h3>Total: ₹<span id="checkoutTotal">0</span></h3>
      <button id="placeOrderBtn" class="place-order-btn">Place Order</button>
    </div>
  </main>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
