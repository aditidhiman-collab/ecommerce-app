<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - ShopEasy</title>
  <h2 class="section-title">Create Account</h2>
    <p id="redirectNotice" class="auth-notice"></p>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="navbar">
    <a href="index.html" style="text-decoration:none;color:inherit;"><h1 class="logo">ShopEasy</h1></a>
    <div class="cart-icon" id="cartIcon">
      🛒 Cart (<span id="cartCount">0</span>)
    </div>
  </header>

  <main class="auth-main">
    <h2 class="section-title">Create Account</h2>

    <form id="signupForm" class="auth-form">
      <label for="signupName">Full Name</label>
      <input type="text" id="signupName" placeholder="Aditi Dhiman">

      <label for="signupEmail">Email</label>
      <input type="email" id="signupEmail" placeholder="you@example.com">

      <label for="signupPassword">Password</label>
      <input type="password" id="signupPassword" placeholder="At least 6 characters">

      <label for="signupConfirmPassword">Confirm Password</label>
      <input type="password" id="signupConfirmPassword" placeholder="Re-enter password">

      <p id="signupError" class="auth-error"></p>

      <button type="submit" class="auth-submit-btn">Sign Up</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
  </main>

  <div id="cartPanel" class="cart-panel">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button id="closeCart">✕</button>
    </div>
    <div id="cartItems" class="cart-items"></div>
    <div class="cart-total">
      <strong>Total: ₹<span id="cartTotal">0</span></strong>
      <a href="checkout.html" class="checkout-btn">Checkout</a>
    </div>
  </div>
  <div id="cartOverlay" class="cart-overlay"></div>

  <footer>
    <p>&copy; 2026 ShopEasy. Built for practice.</p>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
