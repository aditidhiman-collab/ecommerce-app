<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ShopEasy</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="navbar">
    <a href="index.html" style="text-decoration:none;color:inherit;"><h1 class="logo">ShopEasy</h1></a>
    <div class="cart-icon" id="cartIcon">
      🛒 Cart (<span id="cartCount">0</span>)
    </div>
  </header>

  <main class="auth-main">
    <h2 class="section-title">Log In</h2>

    <form id="loginForm" class="auth-form">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com">

      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="Your password">

      <p id="loginError" class="auth-error"></p>

      <button type="submit" class="auth-submit-btn">Log In</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
  </main>

  <div id="cartPanel" class="cart-panel">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button id="closeCart">✕</button>
    </div>
    <div id="cartItems" class="cart-items"></div>
    <div class="cart-total">
      <strong>Total: ₹<span id="cartTotal">0</span></strong>
      <a href="checkout.html" class="checkout-btn">Checkout</a>
    </div>
  </div>
  <div id="cartOverlay" class="cart-overlay"></div>

  <footer>
    <p>&copy; 2026 ShopEasy. Built for practice.</p>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
